<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-primary:#fff;--bg-secondary:#f8f9fb;--indigo:#533afd;--indigo-hover:#462de0;--white:#fff;--text-primary:#1f2937;--text-secondary:#6b7280;--text-muted:#9ca3af;--gray-400:#8b95a6;--gray-500:#6b7280;--gray-600:#4b5563;--radius:9999px;--radius-md:16px}
body{font-family:'Inter',sans-serif;font-weight:300;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:640px;margin:0 auto;padding:0 20px}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;max-width:1120px;margin:0 auto}
.nav-links{display:flex;gap:6px}
.nav-links a{color:var(--gray-400);text-decoration:none;font-size:13px;font-weight:400;padding:6px 12px;border-radius:var(--radius);transition:all .2s}
.nav-links a:hover{color:var(--text-primary);background:var(--bg-secondary)}
.page-header{padding:60px 0 32px;text-align:center}
.page-header h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;margin-bottom:8px}
.page-header p{color:var(--text-secondary);font-size:1rem}
.form-card{background:var(--bg-primary);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:28px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:400;color:var(--gray-400);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1px solid var(--gray-200);border-radius:12px;background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-family:'Inter',sans-serif;font-weight:300;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--indigo)}
.form-group textarea{min-height:140px;resize:vertical}
.btn-submit{padding:12px 28px;background:var(--indigo);color:var(--white);border:none;border-radius:var(--radius);font-size:14px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:background .2s}
.btn-submit:hover{background:var(--indigo-hover)}
footer{border-top:1px solid var(--gray-100);padding:40px 0 24px;margin-top:40px}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:24px;margin-bottom:24px}
.footer-col h4{font-size:12px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.footer-col a{display:block;color:var(--gray-500);text-decoration:none;font-size:13px;font-weight:300;padding:4px 0;transition:color .2s}
.footer-col a:hover{color:var(--white)}
.footer-bottom{text-align:center;font-size:12px;color:var(--gray-500)}
</style>
</head>
