<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fb;
  --bg-tertiary: #eef0f4;
  --indigo: #533afd;
  --indigo-hover: #462de0;
  --white: #ffffff;
  --text-primary: #1f2937;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --gray-50: #f8f9fb;
  --gray-100: #eef0f4;
  --gray-200: #dde0e8;
  --gray-400: #8b95a6;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-800: #1f2937;
  --radius: 9999px;
  --radius-sm: 12px;
  --radius-md: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,.1);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.15);
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 300;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

/* Header Ad */
.header-ad {
  background: var(--bg-secondary);
  display: flex; justify-content: center; align-items: center;
  padding: 12px 0;
  min-height: 90px;
}
.ad-placeholder {
  background: var(--bg-tertiary);
  border: 1px dashed var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Hero Section */
.hero {
  position: relative;
  padding: 80px 0 60px;
  text-align: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 15% 50%, rgba(83,58,253,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 85% 30%, rgba(83,58,253,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 80%, rgba(83,58,253,0.03) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.hero p {
  font-size: clamp(1rem, 2vw, 1.15rem);
  color: var(--text-secondary);
  max-width: 560px;
  margin: 0 auto 24px;
  font-weight: 300;
}

/* Search */
.search-wrap {
  max-width: 480px;
  margin: 0 auto 40px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--gray-400); pointer-events: none;
}
.search-wrap input {
  width: 100%; padding: 14px 16px 14px 46px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 300;
  outline: none; transition: border-color .2s;
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus { border-color: var(--indigo); }

/* Category Grid */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 40px;
}
.cat-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 400;
  cursor: pointer; transition: all .2s;
}
.cat-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.cat-btn.active {
  background: var(--indigo);
  border-color: var(--indigo);
  color: var(--white);
}
.cat-btn svg { flex-shrink: 0; }

/* Converter Card */
.converter-card {
  background: var(--bg-primary);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 32px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-sm);
}
.converter-card.hidden { display: none; }
.card-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px;
}
.card-header svg { color: var(--indigo); }
.card-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
}

/* Unit Inputs */
.conversion-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
@media (min-width: 640px) {
  .conversion-grid { grid-template-columns: 1fr 1fr; }
}
.unit-group { display: flex; flex-direction: column; gap: 8px; }
.unit-group label {
  font-size: 13px; font-weight: 400; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.unit-row {
  display: flex; gap: 0;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
}
.unit-row select {
  padding: 10px 12px;
  background: var(--bg-secondary);
  border: none; border-right: 1px solid var(--gray-200);
  color: var(--text-primary);
  font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 300;
  outline: none; min-width: 80px;
  cursor: pointer;
}
.unit-row select option { background: var(--bg-primary); color: var(--text-primary); }
.unit-row input {
  flex: 1;
  padding: 10px 14px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 16px; font-family: 'Inter', sans-serif; font-weight: 300;
  outline: none;
  min-width: 0;
}
.unit-row input::placeholder { color: var(--text-muted); }

/* Sidebar Layout */
.content-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 960px) {
  .content-layout { grid-template-columns: 1fr 300px; }
}
.sidebar-ad {
  position: sticky; top: 20px;
  display: flex; justify-content: center; align-items: center;
  min-height: 250px;
}

/* Nav */
.top-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  max-width: 1120px; margin: 0 auto;
}
.nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px; font-weight: 400;
  padding: 6px 12px;
  border-radius: var(--radius);
  transition: all .2s;
}
.nav-links a:hover { color: var(--text-primary); background: var(--bg-secondary); }
.nav-links a.cta {
  background: var(--indigo);
  color: var(--white);
}
.nav-links a.cta:hover { background: var(--indigo-hover); }

/* Footer */
footer {
  border-top: 1px solid var(--gray-100);
  padding: 40px 0 24px;
  margin-top: 40px;
}
.footer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 24px;
  margin-bottom: 24px;
}
.footer-col h4 {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.footer-col a {
  display: block;
  color: var(--gray-500); text-decoration: none;
  font-size: 13px; font-weight: 300;
  padding: 4px 0;
  transition: color .2s;
}
.footer-col a:hover { color: var(--text-primary); }
.footer-bottom {
  text-align: center;
  font-size: 12px; color: var(--gray-500);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

/* Values display */
.all-values {
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200);
}
.all-values.hidden { display: none; }
.val-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--gray-100);
}
.val-row:last-child { border-bottom: none; }
.val-label { color: var(--text-muted); }
.val-number { color: var(--text-primary); font-weight: 400; font-variant-numeric: tabular-nums; }
</style>
</head>

          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M9 4v16"/><path d="M15 4v16"/><path d="M4 9h16"/><path d="M4 15h16"/></svg>

                <option value="L">리터 (L)</option>
                <option value="gal">갤런 (gal)</option>

              <input type="number" id="volumeFromVal" placeholder="값 입력" oninput="convert('volume')" autocomplete="off">

          </div>
          <div class="unit-group">
            <label>변환 결과</label>
            <div class="unit-row">
              <select id="volumeToUnit" onchange="convert('volume')">
                <option value="ml">밀리리터 (mL)</option>
                <option value="L" selected>리터 (L)</option>
                <option value="gal">갤런 (gal)</option>
                <option value="cup">컵 (cup)</option>
              </select>
              <input type="text" id="volumeToVal" readonly placeholder="결과">
            </div>
          </div>
        </div>
        <div class="all-values" id="volumeAll"></div>
      </div>

<script>
// ===== Conversion Factors (base unit) =====
const CONV = {
  length: {
    base: 'm',
    toBase: { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mile: 1609.344 },
    names: { mm: 'mm', cm: 'cm', m: 'm', km: 'km', in: 'in', ft: 'ft', yd: 'yd', mile: 'mile' }
  },
  weight: {
    base: 'g',
    toBase: { g: 1, kg: 1000, ton: 1e6, lb: 453.59237, oz: 28.349523125 },
    names: { g: 'g', kg: 'kg', ton: 't', lb: 'lb', oz: 'oz' }
  },
  temperature: {
    special: true
  },
  speed: {
    base: 'kmh',
    toBase: { kmh: 1, mph: 1.609344, knot: 1.852, mach: 1234.8 },
    names: { kmh: 'km/h', mph: 'mph', knot: 'kn', mach: 'mach' }
  },
  area: {
    base: 'sqm',
    toBase: { sqm: 1, sqft: 0.09290304, acre: 4046.8564224, hectare: 10000 },
    names: { sqm: 'm\u00b2', sqft: 'ft\u00b2', acre: 'ac', hectare: 'ha' }
  },
  volume: {
    base: 'ml',
    toBase: { ml: 1, L: 1000, gal: 3785.411784, cup: 236.5882365 },
    names: { ml: 'mL', L: 'L', gal: 'gal', cup: 'cup' }
  }
};

function tempToK(value, from) {
  if (from === 'C') return value + 273.15;
  if (from === 'F') return (value + 459.67) * 5/9;
  return value; // K
}
function tempFromK(value, to) {
  if (to === 'C') return value - 273.15;
  if (to === 'F') return value * 9/5 - 459.67;
  return value; // K
}

function formatNum(v) {
  if (v === undefined || v === null || isNaN(v)) return '';
  if (Math.abs(v) >= 1e9) return v.toExponential(4);
  if (Number.isInteger(v) && Math.abs(v) < 1e15) return v.toString();
  return parseFloat(v.toFixed(8)).toString();
}

function convertAll(cat, fromVal, fromUnit) {
  const cfg = CONV[cat];
  if (!fromVal || isNaN(fromVal)) return {};
  const val = parseFloat(fromVal);
  const results = {};
  if (cfg.special) {
    const k = tempToK(val, fromUnit);
    for (const u of ['C','F','K']) {
      results[u] = tempFromK(k, u);
    }
  } else {
    const base = val * cfg.toBase[fromUnit];
    for (const [u, factor] of Object.entries(cfg.toBase)) {
      results[u] = base / factor;
    }
  }
  return results;
}

function convert(cat) {
  const prefixMap = { length: 'length', weight: 'weight', temperature: 'temp', speed: 'speed', area: 'area', volume: 'volume' };
  const p = prefixMap[cat];
  const fromVal = document.getElementById(p + 'FromVal');
  const fromUnit = document.getElementById(p + 'FromUnit');
  const toVal = document.getElementById(p + 'ToVal');
  const toUnit = document.getElementById(p + 'ToUnit');
  const allDiv = document.getElementById(p + 'All');
  if (!fromVal || !fromUnit || !toVal || !toUnit) return;

  const results = convertAll(cat, fromVal.value, fromUnit.value);
  if (!results || Object.keys(results).length === 0) {
    toVal.value = '';
    allDiv.classList.add('hidden');
    return;
  }

  // Set primary result
  toVal.value = formatNum(results[toUnit.value]);

  // Show all values
  const cfg = CONV[cat];
  const names = cfg.special ? { C: 'C', F: 'F', K: 'K' } : cfg.names;
  let html = '';
  for (const [u, v] of Object.entries(results)) {
    const label = names[u] || u;
    html += '<div class="val-row"><span class="val-label">' + label + '</span><span class="val-number">' + formatNum(v) + '</span></div>';
  }
  allDiv.innerHTML = html;
  allDiv.classList.remove('hidden');
}

// Category switching
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const cat = this.dataset.cat;
    document.querySelectorAll('.converter-card').forEach(c => c.classList.add('hidden'));
    const card = document.getElementById('card-' + cat);
    if (card) {
      card.classList.remove('hidden');
      // Auto-scroll
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});

// Search filtering
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    const match = !q || text.includes(q);
    btn.style.display = match ? '' : 'none';
  });
});

// Show first category by default
convert('length');
</script>
